name: Sinado CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore & Build
      run: |
        dotnet restore sinado.sln
        dotnet build sinado.sln --no-restore --configuration Release

    - name: Test
    run: dotnet test sinado.sln --no-build --report-trx

  deploy-to-azure:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 'Deploy to Azure App Service'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sinado-api' # You'll name this in Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .