name: Sinado CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy: # Combined into one job
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore sinado.sln

    - name: Build
      run: dotnet build sinado.sln --configuration Release

    # Debug step: list files to ensure the binary exists (optional)
    - name: List Binaries
      run: ls -R Sinado.Tests/bin/

    - name: Test
      run: dotnet test --solution sinado.sln --report-trx

    # 1. You MUST "Publish" the app to a folder to prepare it for Azure
    - name: Publish API
      run: dotnet publish Sinado.Api/Sinado.Api.csproj -c Release -o ./publish-folder

    # 2. Deploy only if we are on the main branch
    - name: 'Deploy to Azure App Service'
      if: github.ref == 'refs/heads/main'
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'sinado'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish-folder # Point specifically to the published code